name: Deploy Notal Mobile PWA

on:
  push:
    branches: [main]
    paths:
      - 'mobile-pwa/**'
      - '.github/workflows/deploy-mobile.yml'
  workflow_dispatch:

# Cancel in-flight deploys on repush.
concurrency:
  group: pages-mobile
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile-pwa/package-lock.json

      - name: Install deps
        working-directory: mobile-pwa
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        working-directory: mobile-pwa
        run: npm run typecheck

      - name: Build PWA
        working-directory: mobile-pwa
        env:
          VITE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: npm run build

      - name: Verify manifest subpath
        run: |
          test -f docs/notal-mobile/index.html
          test -f docs/notal-mobile/manifest.webmanifest
          grep -q '/ainotepad/notal-mobile/' docs/notal-mobile/manifest.webmanifest

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
